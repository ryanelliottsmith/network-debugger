name: RC Release

on:
  push:
    branches:
      - main

concurrency:
  group: rc-release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ryanelliottsmith/network-debugger

jobs:
  build-and-release:
    name: Build and Release RC
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.NEXT_RC_VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25'

      - name: Detect next RC version
        id: version
        run: |
          bash .github/scripts/version-detect.sh
          cat "$GITHUB_OUTPUT"

      - name: Check if tag exists
        run: |
          if git rev-parse "${{ steps.version.outputs.NEXT_RC_VERSION }}" >/dev/null 2>&1; then
            echo "Error: Tag ${{ steps.version.outputs.NEXT_RC_VERSION }} already exists"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.NEXT_RC_VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
          build-args: |
            VERSION=${{ steps.version.outputs.NEXT_RC_VERSION }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build binaries
        run: |
          VERSION="${{ steps.version.outputs.NEXT_RC_VERSION }}"
          COMMIT="${{ github.sha }}"
          BUILD_DATE="$(date -u +%Y-%m-%d)"
          
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.Version=$VERSION -X main.Commit=$COMMIT -X main.BuildDate=$BUILD_DATE" \
            -o netdebug-linux-amd64 ./cmd/netdebug
          
          GOOS=linux GOARCH=arm64 go build \
            -ldflags "-X main.Version=$VERSION -X main.Commit=$COMMIT -X main.BuildDate=$BUILD_DATE" \
            -o netdebug-linux-arm64 ./cmd/netdebug
          
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-X main.Version=$VERSION -X main.Commit=$COMMIT -X main.BuildDate=$BUILD_DATE" \
            -o netdebug-darwin-arm64 ./cmd/netdebug
          
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.Version=$VERSION -X main.Commit=$COMMIT -X main.BuildDate=$BUILD_DATE" \
            -o netdebug-windows-amd64.exe ./cmd/netdebug

      - name: Create RC Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.version.outputs.NEXT_RC_VERSION }}
          name: ${{ steps.version.outputs.NEXT_RC_VERSION }} (Release Candidate)
          prerelease: true
          body: |
            RC build from commit: ${{ github.sha }}
            
            ${{ github.event.head_commit.message }}
          files: |
            netdebug-linux-amd64
            netdebug-linux-arm64
            netdebug-darwin-arm64
            netdebug-windows-amd64.exe
