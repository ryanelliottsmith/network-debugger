name: Stable Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string
      rc_tag:
        description: 'RC tag to promote (optional, e.g., v1.0.1-rc.3)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ryanelliottsmith/network-debugger

jobs:
  build-and-release:
    name: Build and Release Stable
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid version format. Must be vX.Y.Z (e.g., v1.0.0)"
            exit 1
          fi
          echo "Version format validated: $VERSION"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.rc_tag || github.sha }}

      - name: Check version is greater than last stable
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          LAST_STABLE=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v '-' | head -n1)
          
          if [ -z "$LAST_STABLE" ]; then
            echo "No previous stable releases found. Proceeding with $INPUT_VERSION"
            exit 0
          fi
          
          # Compare versions (strip 'v' prefix for comparison)
          INPUT_NUM=${INPUT_VERSION#v}
          LAST_NUM=${LAST_STABLE#v}
          
          if [ "$(printf '%s\n' "$INPUT_NUM" "$LAST_NUM" | sort -V | head -n1)" = "$INPUT_NUM" ] && [ "$INPUT_NUM" != "$LAST_NUM" ]; then
            echo "Error: Version $INPUT_VERSION must be greater than last stable $LAST_STABLE"
            exit 1
          fi
          
          if [ "$INPUT_VERSION" = "$LAST_STABLE" ]; then
            echo "Error: Version $INPUT_VERSION already exists"
            exit 1
          fi
          
          echo "Version $INPUT_VERSION is valid (last stable: $LAST_STABLE)"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION=${{ github.event.inputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build binaries
        run: |
          VERSION="${{ github.event.inputs.version }}"
          COMMIT="${{ github.sha }}"
          BUILD_DATE="$(date -u +%Y-%m-%d)"
          
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.Version=$VERSION -X main.Commit=$COMMIT -X main.BuildDate=$BUILD_DATE" \
            -o netdebug-linux-amd64 ./cmd/netdebug
          
          GOOS=linux GOARCH=arm64 go build \
            -ldflags "-X main.Version=$VERSION -X main.Commit=$COMMIT -X main.BuildDate=$BUILD_DATE" \
            -o netdebug-linux-arm64 ./cmd/netdebug
          
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-X main.Version=$VERSION -X main.Commit=$COMMIT -X main.BuildDate=$BUILD_DATE" \
            -o netdebug-darwin-arm64 ./cmd/netdebug
          
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.Version=$VERSION -X main.Commit=$COMMIT -X main.BuildDate=$BUILD_DATE" \
            -o netdebug-windows-amd64.exe ./cmd/netdebug

      - name: Create Stable Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          prerelease: false
          generate_release_notes: true
          files: |
            netdebug-linux-amd64
            netdebug-linux-arm64
            netdebug-darwin-arm64
            netdebug-windows-amd64.exe
